app = "penneats"
primary_region = "ewr"

[build]
  dockerfile = "docker/Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  TZ = "America/New_York"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
